name: Release Images

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract batch metadata
        id: meta_batch
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/asr-batch
          tags: |
            type=sha
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push batch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.batch
          push: true
          tags: ${{ steps.meta_batch.outputs.tags }}
          labels: ${{ steps.meta_batch.outputs.labels }}

      - name: Extract online metadata
        id: meta_online
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/asr-online
          tags: |
            type=sha
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push online image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.online
          push: true
          tags: ${{ steps.meta_online.outputs.tags }}
          labels: ${{ steps.meta_online.outputs.labels }}
